apiVersion: apps/v1
kind: Deployment
metadata:
  name: sapphire-nexus
  namespace: eev
  labels:
    app: sapphire-nexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sapphire-nexus
  template:
    metadata:
      labels:
        app: sapphire-nexus
    spec:
      containers:
      - name: sapphire-nexus
        image: docker.io/toluwanimi/sapphire-nexus:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3010
        env:
        - name: SERVICE_FQDN_APP
          value: "http://eev-frontend:3010"
        - name: SERVICE_URL_APP
          value: "http://eev-frontend:3010"
        - name: NEXT_PUBLIC_BASE_URI
          value: "http://eev-build-ai:8000/api/v1"
        - name: NEXT_PUBLIC_OG_IMAGE
          value: ""
        - name: NEXT_PUBLIC_SERVER_URI
          value: "http://eev-backend:8086/api/v1"
        livenessProbe:
          httpGet:
            path: /
            port: 3010
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3010
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: sapphire-nexus
  namespace: eev
spec:
  type: LoadBalancer
  selector:
    app: sapphire-nexus
  ports:
  - port: 3010
    targetPort: 3010
    protocol: TCP
